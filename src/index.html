<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Kelimebaz — Türkçe Kelime Oyunu</title>
  <meta name="description" content="5 harfli gizli Türkçe kelimeyi 6 tahminde bul. Her gün yeni bir kelime, sınırsız serbest oyun.">
  <base href="/">

  <!-- Simge: SVG (keskin, temaya uyumlu), eski tarayıcılar için .ico yedeği -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon.svg">

  <!-- Mobil tarayıcı çubuğu (aşağıdaki script temaya göre günceller) -->
  <meta name="theme-color" content="#10131a">

  <!-- Link paylaşıldığında güzel görünsün -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Kelimebaz — Türkçe Kelime Oyunu">
  <meta property="og:description" content="5 harfli gizli Türkçe kelimeyi 6 tahminde bul.">
  <meta property="og:locale" content="tr_TR">
  <meta name="twitter:card" content="summary">

  <meta name="color-scheme" content="dark light">

  <!--
    TEMAYI ANGULAR'DAN ÖNCE UYGULA.

    Bu script olmadan sayfa önce varsayılan (koyu) temayla boyanır, sonra
    Angular yüklenip aydınlık temaya geçer → gözle görülür bir KOYU FLAŞ olur.
    Burada, daha ilk boyamadan önce doğru temayı yazıyoruz.

    Aynı şey yüksek kontrast (renk körü) modu için de geçerli.
  -->
  <script>
    (function () {
      var root = document.documentElement;
      try {
        var saved = localStorage.getItem('kelimebaz:theme');
        var theme =
          saved === 'light' || saved === 'dark'
            ? saved
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';

        root.dataset.theme = theme;

        if (localStorage.getItem('kelimebaz:contrast') === '1') {
          root.dataset.contrast = 'high';
        }

        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'light' ? '#f6f7fb' : '#10131a');
      } catch (e) {
        root.dataset.theme = 'dark'; // depolama kapalıysa varsayılan
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
