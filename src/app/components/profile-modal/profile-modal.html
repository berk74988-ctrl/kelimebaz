<div class="backdrop" (click)="close.emit()">
  <div
    #dialog
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-label="Profil"
    tabindex="-1"
    (click)="$event.stopPropagation()"
  >
    <button class="x" type="button" aria-label="Profili kapat" (click)="close.emit()">✕</button>

    <h2 class="head">Profil</h2>

    <!-- Kimlik: avatar + ad -->
    <div class="id">
      <div class="big" aria-hidden="true">{{ profile.avatar() }}</div>
      <label class="field">
        <span class="lbl">Oyuncu adın</span>
        <input
          class="inp"
          type="text"
          maxlength="16"
          placeholder="Kelimebaz"
          [value]="profile.name()"
          (input)="onName($event)"
        />
      </label>
    </div>

    <!-- Avatar seçimi — 8 avatar TEK satırda (fieldset yerine group: ızgara
         içinde legend'in davranışı tarayıcıdan tarayıcıya değişiyor) -->
    <div class="avatars" role="group" aria-label="Avatar seç">
      <span class="lbl">Avatar</span>
      <div class="av-row">
        @for (a of avatars; track a) {
          <button
            class="av"
            type="button"
            [class.on]="profile.avatar() === a"
            [attr.aria-pressed]="profile.avatar() === a"
            [attr.aria-label]="'Avatar ' + a"
            (click)="profile.setAvatar(a)"
          >
            {{ a }}
          </button>
        }
      </div>
    </div>

    <div class="rule"></div>

    <h3 class="sub">İstatistikler</h3>
    <app-stats-panel [highlight]="highlight" />

    @if (statsService.isEmpty()) {
      <p class="empty">Henüz oyun oynamadın. İlk kelimeyi bul, buraya yansısın.</p>
    }
  </div>
</div>
