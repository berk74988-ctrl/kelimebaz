<main class="screen">
  <!-- Üst çubuk: geri · başlık · altın -->
  <header class="bar">
    <button class="back" type="button" [attr.aria-label]="i18n.t('common.backTitle')" (click)="back.emit()">←</button>
    <h1 class="title">{{ i18n.t('shop.title') }}</h1>
    <div class="coin" [attr.aria-label]="i18n.t('shop.goldAria', { balance: gold.balance() })">
      <span aria-hidden="true">🪙</span>
      <b>{{ i18n.num(gold.balance()) }}</b>
    </div>
  </header>

  <!-- Kategori sekmeleri -->
  <nav class="tabs" [attr.aria-label]="i18n.t('shop.categoriesAria')">
    @for (cat of categories; track cat) {
      <button
        class="tab"
        type="button"
        [class.on]="activeCat() === cat"
        [attr.aria-pressed]="activeCat() === cat"
        (click)="activeCat.set(cat)"
      >
        <span aria-hidden="true">{{ meta[cat].icon }}</span>
        {{ i18n.t('shopcat.' + cat) }}
      </button>
    }
  </nav>

  <!-- Ürün ızgarası -->
  <div class="grid">
    @for (item of items(); track item.id) {
      @let st = state(item);
      <button
        class="item"
        type="button"
        [class.equipped]="st === 'equipped'"
        [class.locked]="st === 'locked'"
        [disabled]="st === 'locked'"
        [attr.aria-label]="i18n.t('shopitem.' + item.id) + (st === 'equipped' ? i18n.t('shop.ariaEquipped') : st === 'owned' ? i18n.t('shop.ariaOwned') : i18n.t('shop.ariaBuyable', { price: item.price }))"
        (click)="onItem(item)"
      >
        <!-- Önizleme -->
        <div class="pv">
          @switch (item.category) {
            @case ('theme') {
              <span class="pv-swatch" [style.background]="'linear-gradient(135deg, ' + item.preview + ', ' + item.preview2 + ')'"></span>
            }
            @case ('frame') {
              <span class="pv-frame" [style.background]="item.preview === 'transparent' ? 'var(--surface-2)' : item.preview">
                <span class="pv-frame-in">🙂</span>
              </span>
            }
            @default {
              <span class="pv-emoji">{{ item.preview || '—' }}</span>
            }
          }
        </div>

        <span class="i-name">{{ i18n.t('shopitem.' + item.id) }}</span>

        <!-- Durum satırı: fiyat / sahipsin / kullanımda -->
        <span class="i-foot">
          @switch (st) {
            @case ('equipped') {
              <span class="tag on">✓ {{ i18n.t('shop.inUse') }}</span>
            }
            @case ('owned') {
              <span class="tag own">{{ i18n.t('shop.use') }}</span>
            }
            @default {
              @if (item.price === 0) {
                <span class="tag own">{{ i18n.t('shop.use') }}</span>
              } @else {
                <span class="price" [class.no]="st === 'locked'">🪙 {{ item.price }}</span>
              }
            }
          }
        </span>

        <!-- Satın alma geri bildirimi -->
        @if (flash()?.id === item.id) {
          <span class="flash" [class.bad]="!flash()!.ok">
            {{ flash()!.ok ? '✓ ' + i18n.t('shop.bought') : i18n.t('shop.insufficientGold') }}
          </span>
        }
      </button>
    }
  </div>

  <p class="note">{{ i18n.t('shop.note') }}</p>
</main>
