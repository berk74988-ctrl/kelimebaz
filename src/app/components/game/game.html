<div class="game">
  <header class="bar">
    <button class="icon" type="button" aria-label="Başlık ekranına dön" (click)="exit.emit()">←</button>

    <div class="titles">
      <h1>KELİMEBAZ</h1>
      <!-- servisten okunur: "tekrar oyna" serbest moda geçince başlık da güncellenir -->
      <p>{{ game.mode() === 'daily' ? 'Günün Kelimesi' : 'Serbest Oyun' }}</p>
    </div>

    <button
      class="icon"
      type="button"
      [attr.aria-pressed]="contrast.high()"
      [attr.aria-label]="
        contrast.high() ? 'Yüksek kontrast modunu kapat' : 'Yüksek kontrast (renk körü) modunu aç'
      "
      (click)="contrast.toggle()"
    >
      {{ contrast.high() ? '👁️' : '👁' }}
    </button>

    <button class="icon" type="button" aria-label="İstatistikleri göster" (click)="statsOpen.set(true)">
      📊
    </button>

    <button
      class="icon"
      type="button"
      [attr.aria-label]="theme.theme() === 'dark' ? 'Aydınlık moda geç' : 'Karanlık moda geç'"
      (click)="theme.toggle()"
    >
      {{ theme.theme() === 'dark' ? '☀️' : '🌙' }}
    </button>
  </header>

  <!--
    EKRAN OKUYUCU CANLI BÖLGESİ.
    Görsel olarak gizli. Her tahminden sonra harflerin durumunu,
    oyun bitince sonucu ve doğru kelimeyi sesli okur.
    Oyunun tüm bilgisi renkle veriliyor — bu bölge o bilgiyi KELİMEYE çevirir.
  -->
  <p class="sr-only" role="status" aria-live="polite" aria-atomic="true">{{ announcement() }}</p>

  <app-toast [text]="game.message()" />

  <app-board
    [rows]="game.board()"
    [submitted]="game.rowIndex()"
    [shakeKey]="game.invalidShake()"
    [status]="game.status()"
  />

  <app-keyboard
    [keyStates]="game.keyStates()"
    (letter)="game.type($event)"
    (enter)="onEnter()"
    (backspace)="game.backspace()"
  />

  @if (game.isOver() && resultOpen()) {
    <app-result-modal
      [status]="game.status()"
      [answer]="game.answer()"
      [attempts]="game.rowIndex()"
      (playAgain)="newGame()"
      (close)="resultOpen.set(false)"
    />
  }

  @if (game.isOver() && !resultOpen()) {
    <button class="reopen" type="button" (click)="resultOpen.set(true)">Sonucu göster</button>
  }

  @if (statsOpen()) {
    <app-stats-modal (close)="statsOpen.set(false)" />
  }
</div>
