@if (statsService.isEmpty()) {
  <!-- BOŞ DURUM: henüz hiç oyun bitmemiş -->
  <div class="empty">
    <p class="ico" aria-hidden="true">📊</p>
    <p class="t">Henüz istatistik yok</p>
    <p class="s">İlk oyununu bitir, sonuçların burada birikmeye başlasın.</p>
  </div>
} @else {
  <div class="grid">
    <div class="stat">
      <b>{{ stats.played }}</b>
      <span>Oynanan</span>
    </div>
    <div class="stat">
      <b>%{{ statsService.winRate() }}</b>
      <span>Kazanma</span>
    </div>
    <div class="stat">
      <b>{{ stats.currentStreak }}</b>
      <span>Seri</span>
    </div>
    <div class="stat best">
      <b>{{ stats.maxStreak }}</b>
      <span>En iyi</span>
    </div>
  </div>

  <h3 class="dist-title">Tahmin dağılımı</h3>

  <app-guess-distribution [highlight]="highlight()" />
}
